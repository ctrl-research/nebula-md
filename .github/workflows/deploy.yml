name: Build and Deploy Nebula Site

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      vault_repo:
        description: "Vault repository (owner/repo)"
        required: true
        type: string
      vault_directory:
        description: "Directory within vault repo containing markdown files (e.g. vault/)"
        required: true
        default: "vault/"
        type: string
      output_directory:
        description: "Directory to commit built output to in vault repo (e.g. output/)"
        required: true
        default: "output/"
        type: string
      site_name:
        description: "Site name shown in header and titles"
        required: false
        default: "Nebula"
        type: string
      site_theme:
        description: "Default theme: dark or light"
        required: false
        default: "dark"
        type: string
      ignored_dirs:
        description: "Comma-separated list of directory names to ignore"
        required: false
        default: ""
        type: string
      graph_mode:
        description: "Graph viewer: 2d (default) or nebula (3D galaxy)"
        required: false
        default: "2d"
        type: string
      clean_urls:
        description: "Emit internal links without the .html extension (works on GitHub Pages)"
        required: false
        default: true
        type: boolean

  workflow_call:
    inputs:
      vault_repo:
        description: "Vault repository (owner/repo)"
        required: true
        type: string
      vault_directory:
        description: "Directory within vault repo containing markdown files"
        required: true
        type: string
      output_directory:
        description: "Directory to commit built output to"
        required: true
        type: string
      site_name:
        description: "Site name shown in header and titles"
        required: false
        default: "Nebula"
        type: string
      site_theme:
        description: "Default theme: dark or light"
        required: false
        default: "dark"
        type: string
      ignored_dirs:
        description: "Comma-separated list of directory names to ignore"
        required: false
        default: ""
        type: string
      graph_mode:
        description: "Graph viewer: 2d (default) or nebula (3D galaxy)"
        required: false
        default: "2d"
        type: string
      clean_urls:
        description: "Emit internal links without the .html extension (works on GitHub Pages)"
        required: false
        default: true
        type: boolean

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout nebula repo (source only)
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.NEBULA_REPO || 'ctrl-research/nebula-md' }}
          path: nebula
          sparse-checkout: |
            src/
            go.mod
            go.sum
            .env.example
          sparse-checkout-cone-mode: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true
          cache-dependency-path: nebula/go.sum

      - name: Build nebula binary
        run: |
          cd nebula/src
          CGO_ENABLED=0 go build -buildvcs=false -o nebula .

      - name: Checkout vault repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.vault_repo || 'ctrl-research/nebula-md' }}
          path: workspace
          ref: main
          sparse-checkout: |
            ${{ inputs.vault_directory || 'vault' }}
          sparse-checkout-cone-mode: false

      - name: Prepare vault layout for nebula
        run: |
          cp -r "workspace/${{ inputs.vault_directory || 'vault' }}" nebula/vault

      - name: Build site
        run: |
          cd nebula
          ./src/nebula
        env:
          NEBULA_SITE_NAME: ${{ inputs.site_name || 'Nebula ✨' }}
          NEBULA_SITE_THEME: ${{ inputs.site_theme || 'dark' }}
          NEBULA_IGNORED_DIRS: ${{ inputs.ignored_dirs || '' }}
          NEBULA_GRAPH_MODE: ${{ inputs.graph_mode || '2d' }}
          NEBULA_CLEAN_URLS: ${{ inputs.clean_urls }}
          NEBULA_INPUT: vault
          NEBULA_OUTPUT: output

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: nebula/output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
